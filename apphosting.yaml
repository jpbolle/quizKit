# Firebase App Hosting — configuration build/runtime
# https://firebase.google.com/docs/app-hosting/configure
#
# Les variables d'environnement (NEXT_PUBLIC_FIREBASE_*) sont définies
# dans la console Firebase : App Hosting → Backend → Settings → Environment.

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80
