# Firebase App Hosting — configuration build/runtime
# https://firebase.google.com/docs/app-hosting/configure
#
# Les variables NEXT_PUBLIC_* ne sont pas des secrets : Next.js les inline
# dans le bundle livré au navigateur. On les met donc directement ici pour
# garantir leur disponibilité au BUILD (sinon le client ne peut pas joindre
# Firebase).

runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCivNF5rhe-l34dLEed4jrOskSgzr-ZMVw
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: quizkit-7116e.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: quizkit-7116e
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: quizkit-7116e.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "133297103495"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:133297103495:web:4a573dfea9a3a834d7ce22
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-RRLF1965ZM
    availability:
      - BUILD
      - RUNTIME
